<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Github Issues Tracker</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- Font Awosome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


     <!-- Tailwind + DaisyUI  -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <style>
        body {
            font-family: 'Geist', sans-serif;
        }
      </style>
</head>
<body class="flex items-center justify-center mt-20">
    <div class="bg-base-200 rounded-lg p-8  shadow-md">
        <div class="flex flex-col items-center gap-2 my-8">
            <img src="assets/github-logo.png" alt="">
            <h2 class="text-3xl font-bold">Github Issues Tracker</h2>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>
        <div class="flex flex-col items-center gap-2">
        <fieldset class="fieldset rounded-box w-xs  p-4">
            <label class="label text-black font-medium">Username</label>
            <input id="username" type="text" class="input rounded-lg" placeholder="Enter Username" value="admin" />
            <label class="text-primary">Default: admin</label>
            <label class="label text-black font-medium">Password</label>
            <input id="password" type="password" class="input rounded-lg" placeholder="Enter Password" value="admin123" />
            <label class="text-primary">Default: admin123</label>
            <button class="btn btn-primary mt-4" onclick="loginDataCheck()">Sign In</button>
        </fieldset>
         <div class="divider">OR</div>
        <p class="text-gray-500 text-[14px]">Demo Credential</p>
        <div class="bg-base-300 py-4 px-20 rounded-md shadow-lg">
            <p ><span class="font-bold">Username</span>: admin</p>
            <p ><span class="font-bold">Password</span>: admin123</p>
        </div>
        </div>
    </div>
    <script src="script/loginScript.js"></script>
</body>
</html>
