<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- Font Awosome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

     <!-- Tailwind + DaisyUI  -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <style>
        body {
            font-family: 'Geist', sans-serif;
        }
      </style>
</head>
<body>
    <header class="flex justify-between items-center mx-8">
       <div class="flex items-center my-3">
            <img class="w-10 h-10" src="../assets/github-logo.png" alt="">
            <h2 class="text-2xl font-bold">Github Issues Tracker</h2>
        </div>
        <div>
            <div class="join flex gap-4">
                <div>
                    <label class="input validator join-item">
                    <i class="text-gray-500 fa-solid fa-magnifying-glass"></i><input type="text" id="search-input" placeholder="search issues" />
                    </label>
                </div>
                <button id="btn-search" class="btn btn-primary join-item rounded-sm">Search</button>
            </div>
        </div>

    </header>
    <section class="bg-base-300 pt-10 mt-5">
        <div class="w-10/12 mx-auto">
            <div class="flex items-center gap-4 p-4 bg-white  rounded-md">
                <button onclick="loadAllIssues()" id="all-button" class="all-btn btn btn-outline btn-primary w-[100px]">All</button>
                <button onclick="loadOpenIssues()" id="open-btn" class="all-btn btn btn-outline btn-primary w-[100px]">Open</button>
                <button onclick="loadClosedIssues()" id="closed-btn" class="all-btn btn btn-outline btn-primary w-[100px]">Closed</button>
            </div>

            <div class="flex justify-between items-center gap-4 p-4 bg-white rounded-md mt-5">
                <div class="flex items-center gap-2">
                    <img src="../assets/Aperture.png" alt="">
                    <div>
                        <h2 id="issue-length" class="text-xl font-bold"></h2>
                        <p class="text-gray-500">Track and manage your project Issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <i class="fa-regular fa-circle bg-[#00A96E] rounded-full"></i>
                    <p>Open</p>
                    <i class="fa-regular fa-circle bg-[#A855F7] rounded-full"></i>
                    <p>Closed</p>
                </div> 
            </div>
            <section id="spinner-section" class="flex justify-center items-center py-10 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </section>
            <dialog id="my_modal_5" class="modal">
                <div class="modal-box">
                    <div id="issue-details-container">
                        
                    </div>
                    <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                    </div>
                </div>
            </dialog>
            <hr class="border-gray-400">
            <section id="issue-cards" class="bg-base-200 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-5 rounded-lg">
                    
            </section>
        </div>
    </section>
    <script src="../script/home.js"></script>
</body>
</html>
