<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- Font Awosome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Css file link-->

        <link rel="stylesheet" href="style/style.css">

     <!-- Tailwind + DaisyUI  -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <style>
        body {
            font-family: 'Geist', sans-serif;
        }
      </style>
</head>
<body>
    <header class="flex justify-between items-center mx-8">
       <div class="flex items-center my-3">
            <img class="w-10 h-10" src="../assets/github-logo.png" alt="">
            <h2 class="text-2xl font-bold">Github Issues Tracker</h2>
        </div>
        <div>
            <div class="join flex gap-4">
                <div>
                    <label class="input validator join-item">
                    <i class="text-gray-500 fa-solid fa-magnifying-glass"></i><input type="email" placeholder="search issues" />
                    </label>
                </div>
                <button class="btn btn-primary join-item rounded-sm"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>

    </header>
    <section class="bg-base-300 pt-10 mt-5">
        <div class="w-11/12 mx-auto">
            <div class="flex items-center gap-4 p-4 bg-white  rounded-md">
                <button id="all-btn" class="btn btn-primary w-[100px]">All</button>
                <button id="open-btn" class="btn btn-primary w-[100px]">Open</button>
                <button id="closed-btn" class="btn btn-primary w-[100px]">Closed</button>
            </div>

            <div class="flex justify-between items-center gap-4 p-4 bg-white rounded-md mt-5">
                <div class="flex items-center gap-2">
                    <img src="../assets/Aperture.png" alt="">
                    <div>
                        <h2 class="text-xl font-bold">50 Issues</h2>
                        <p class="text-gray-500">Track and manage your project Issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <i class="fa-regular fa-circle bg-[#00A96E] rounded-full"></i>
                    <p>Open</p>
                    <i class="fa-regular fa-circle bg-[#A855F7] rounded-full"></i>
                    <p>Closed</p>
                </div> 
            </div>
            <hr class="border-gray-400">
        </div>
    </section>
    
</body>
</html>
